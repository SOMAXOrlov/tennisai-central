# Local PostgreSQL for development — matches DATABASE_URL in .env.example.
#   docker compose up -d      # start
#   npm run db:setup          # migrate + seed
#   docker compose down       # stop (add -v to wipe data)
services:
  db:
    image: postgres:16-alpine
    container_name: tennisai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tennisai
      POSTGRES_PASSWORD: tennisai
      POSTGRES_DB: tennisai
    ports:
      - "5432:5432"
    volumes:
      - tennisai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tennisai -d tennisai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tennisai_pgdata:
