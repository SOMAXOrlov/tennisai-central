name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (type-check · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # plain `npm install` can hang resolving optional playwright/vitest-browser
      # peers — the legacy flag matches the project's documented install.
      - name: Install
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Type-check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (prisma · type-check · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    # The hardened env loader requires these to be present; they are dummy
    # values — no real database is contacted (validate/generate/tsc/unit tests
    # never open a connection).
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      JWT_SECRET: ci-only-secret-not-used-in-production-000000
      APP_URL: http://localhost:5180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test
